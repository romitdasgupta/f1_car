<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 CAR // MECHANICAL BREAKOUT</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.168.0",
        "three/addons/": "https://esm.sh/three@0.168.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@23.1.3"
      }
    }
  </script>
</head>
<body>

  <!-- Three.js WebGL canvas -->
  <canvas id="three-canvas"></canvas>

  <!-- CSS2DRenderer overlay container -->
  <div id="css2d-container"></div>

  <!-- UI Overlay -->
  <div id="ui-overlay">

    <!-- Title bar -->
    <header id="title-bar">
      <span class="title-text">F1 CAR <span class="title-sep">//</span> MECHANICAL BREAKOUT</span>
    </header>

    <!-- Legend panel (left side) -->
    <aside id="legend-panel">
      <h2 class="panel-heading">SYSTEMS</h2>
      <ul class="group-list">
        <li>
          <button class="group-btn" data-group="powerUnit">
            <span class="dot" style="background:#E63946;"></span>
            <span class="group-label">Power Unit</span>
            <span class="chevron">&#x276F;</span>
          </button>
        </li>
        <li>
          <button class="group-btn" data-group="drivetrain">
            <span class="dot" style="background:#E76F51;"></span>
            <span class="group-label">Drivetrain</span>
            <span class="chevron">&#x276F;</span>
          </button>
        </li>
        <li>
          <button class="group-btn" data-group="chassis">
            <span class="dot" style="background:#F4A261;"></span>
            <span class="group-label">Chassis</span>
            <span class="chevron">&#x276F;</span>
          </button>
        </li>
        <li>
          <button class="group-btn" data-group="aerodynamics">
            <span class="dot" style="background:#2A9D8F;"></span>
            <span class="group-label">Aerodynamics</span>
            <span class="chevron">&#x276F;</span>
          </button>
        </li>
        <li>
          <button class="group-btn" data-group="suspension">
            <span class="dot" style="background:#264653;"></span>
            <span class="group-label">Suspension</span>
            <span class="chevron">&#x276F;</span>
          </button>
        </li>
        <li>
          <button class="group-btn" data-group="wheelsAndBrakes">
            <span class="dot" style="background:#A8DADC;"></span>
            <span class="group-label">Wheels &amp; Brakes</span>
            <span class="chevron">&#x276F;</span>
          </button>
        </li>
        <li>
          <button class="group-btn" data-group="steering">
            <span class="dot" style="background:#457B9D;"></span>
            <span class="group-label">Steering &amp; Driver</span>
            <span class="chevron">&#x276F;</span>
          </button>
        </li>
      </ul>
      <div class="legend-actions">
        <button id="btn-explode-all" class="action-btn">EXPLODE ALL</button>
        <button id="btn-reset" class="action-btn">RESET</button>
      </div>
    </aside>

    <!-- Detail panel (right side, initially hidden) -->
    <aside id="detail-panel" class="hidden">
      <button id="detail-close" class="detail-close-btn">&times;</button>
      <div class="detail-system">
        <span class="detail-dot"></span>
        <span id="detail-system-name" class="detail-system-label">—</span>
      </div>
      <h2 id="detail-part-name" class="detail-title">Part Name</h2>
      <p id="detail-description" class="detail-desc">Select a part to see details.</p>
    </aside>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
